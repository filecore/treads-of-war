# nginx-sample.conf — location blocks for /relay proxy
# Add these inside your server {} block in the games nginx config.
# The relay container must be named "relay" in docker-compose.yml (or adjust proxy_pass).

location = /relay {
    proxy_pass         http://relay:8765;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 86400s;
}

location = /relay/discover {
    proxy_pass       http://relay:8765/discover;
    proxy_set_header Host $host;
}
